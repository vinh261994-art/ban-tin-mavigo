# HƯỚNG DẪN ĐIỀN:
#   - Chỉ cần URL công khai, không cần đăng nhập
#   - Etsy:  https://www.etsy.com/shop/<TEN_SHOP>
#   - eBay:  https://www.ebay.com/str/<TEN>   (store)
#            hoặc https://www.ebay.com/usr/<TEN>  (user profile)
#   - `name` chỉ để hiển thị trong bản tin, đặt gì cũng được
