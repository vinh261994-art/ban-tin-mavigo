# ==========================================================
#  BẢN TIN MAVIGO — DAILY BRIEF
# ==========================================================
#  Chạy 8h sáng VN mỗi ngày (= 01:00 UTC). Scrape shop,
#  check keyword trend, render bản tin, gửi Telegram.
#
#  YÊU CẦU SECRETS (Settings → Secrets → Actions):
#    TELEGRAM_BOT_TOKEN — token từ @BotFather
#    TELEGRAM_CHAT_ID   — chat ID (âm nếu là group, dương nếu 1:1)
#
#  Không cần GEMINI_API_KEY cho daily (chỉ weekly dùng).
#
#  MANUAL TEST: vào tab Actions → "Daily Brief" → Run workflow
#  Repo cần PERMISSIONS: Settings → Actions → General →
#    Workflow permissions = "Read and write permissions"
#    (để auto-commit state về data/*.json)
# ==========================================================

name: Daily Brief

on:
  schedule:
    # GitHub Actions skips cron at peak load — phút chẵn 0/15/30/45 ở 00-04 UTC
    # bị bỏ qua nhiều nhất. Dùng phút lẻ + trải mỏng nhiều khung giờ.
    # run_lock dedup đảm bảo chỉ 1 bản tin / UTC day tới Telegram.
    - cron: "13 1 * * *"   # 08:13 VN
    - cron: "37 1 * * *"   # 08:37 VN
    - cron: "11 2 * * *"   # 09:11 VN
    - cron: "43 3 * * *"   # 10:43 VN
    - cron: "17 5 * * *"   # 12:17 VN (trưa, ngoài peak EU)
    - cron: "29 9 * * *"   # 16:29 VN (chiều, off-peak)
  workflow_dispatch:
    inputs:
      force_send:
        description: "Bypass dedup (re-send today's bulletin)"
        type: boolean
        default: false

concurrency:
  group: mavigo-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write     # needed for git-auto-commit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHOPS_SHEET_URL: ${{ secrets.SHOPS_SHEET_URL }}
          FORCE_SEND: ${{ inputs.force_send && '1' || '' }}
          PYTHONIOENCODING: utf-8
        run: python scripts/daily_report.py

      - name: Commit updated state files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update daily state [skip ci]"
          file_pattern: "data/*.json"
          commit_user_name: "mavigo-bot"
          commit_user_email: "mavigo-bot@users.noreply.github.com"
